<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Release Notes — API4COM</title>
  <link rel="stylesheet" href="/app/style.css" />
</head>
<body>
  <div id="layout">
    <aside id="sidebar">
      <header>
        <h1>Release Notes</h1>
        <span class="brand">API4COM</span>
      </header>
      <input id="search" type="search" placeholder="Buscar por feature, tag, versão..." autocomplete="off" />
      <div id="count" class="count"></div>
      <nav id="list"></nav>
    </aside>

    <main id="main">
      <div id="viewer">
        <div id="empty" class="empty">
          <p>Selecione uma release à esquerda.</p>
        </div>
        <article id="content" hidden>
          <div id="meta-bar"></div>
          <div id="tabs">
            <button class="tab active" data-tab="interno">Interno</button>
            <button class="tab" data-tab="externo">Externo</button>
          </div>
          <div id="doc" class="markdown"></div>
        </article>
      </div>
    </main>
  </div>

  <script src="/app/vendor/marked.min.js"></script>
  <script src="/app/app.js"></script>
</body>
</html>
